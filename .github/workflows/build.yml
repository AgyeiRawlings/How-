name: Build KsDumper EXE
on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Install WDK Build Tools
        shell: powershell
        run: |
          # Install the WDK NuGet package to resolve kernel headers/macros automatically
          nuget install Microsoft.DotNet.Wpf.GitHub-WDK-Headers -Version 0.0.0.1 -OutputDirectory .\packages

      - name: Restore Dependencies
        run: nuget restore KsDumper11.sln

      - name: Build C# Components
        run: |
          msbuild DarkControls\DarkControls.csproj /p:Configuration=Release /p:Platform="AnyCPU"
          msbuild DriverInterface\DriverInterface.csproj /p:Configuration=Release /p:Platform="AnyCPU"
          msbuild KsDumper11\KsDumper11.csproj /p:Configuration=Release /p:Platform="x86" /p:OutputPath=bin\x86\Release

      - name: Build KsDumperDriver (Kernel Driver)
        shell: cmd
        run: |
          msbuild KsDumperDriver\KsDumperDriver.vcxproj /p:Configuration=Release /p:Platform=x64 ^
          /p:TargetPlatformVersion=10.0.22621.0 ^
          /p:PlatformToolset=WindowsKernelModeDriver10.0 ^
          /p:AdditionalIncludeDirectories="C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km;C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\shared" ^
          /p:PreprocessorDefinitions="_AMD64_;_KERNEL_MODE;%PreprocessorDefinitions%"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KsDumper-Full-Build
          path: |
            KsDumper11/bin/x86/Release/KsDumper11.exe
            KsDumperDriver/x64/Release/KsDumperDriver.sys
