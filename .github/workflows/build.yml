name: Build KsDumper EXE
on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Extract WDK Headers and Libs
        shell: powershell
        run: |
          $incBase = "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0"
          $libBase = "C:\Program Files (x86)\Windows Kits\10\Lib\10.0.22621.0"
          New-Item -ItemType Directory -Force -Path "$incBase\km", "$incBase\shared", "$libBase\km\x64"

          # Extract Headers
          Expand-Archive -Path WDKHeaders.zip -DestinationPath "C:\WDKTemp" -Force
          Copy-Item "C:\WDKTemp\km\*" "$incBase\km" -Recurse -Force
          Copy-Item "C:\WDKTemp\shared\*" "$incBase\shared" -Recurse -Force

          # Extract Libs
          Expand-Archive -Path WDKLib.zip -DestinationPath "C:\WDKLibTemp" -Force
          Copy-Item "C:\WDKLibTemp\km\*" "$libBase\km\x64" -Recurse -Force

      - name: Restore Dependencies
        run: nuget restore KsDumper11.sln

      - name: Build C# Components
        run: |
          msbuild DarkControls\DarkControls.csproj /p:Configuration=Release /p:Platform="AnyCPU"
          msbuild DriverInterface\DriverInterface.csproj /p:Configuration=Release /p:Platform="AnyCPU"
          msbuild KsDumper11\KsDumper11.csproj /p:Configuration=Release /p:Platform="x86" /p:OutputPath=bin\x86\Release

      - name: Build KsDumperDriver (Kernel Driver)
        shell: cmd
        run: |
          msbuild KsDumperDriver\KsDumperDriver.vcxproj /p:Configuration=Release /p:Platform=x64 ^
          /p:IncludePath="C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km;C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\shared;%IncludePath%" ^
          /p:LibraryPath="C:\Program Files (x86)\Windows Kits\10\Lib\10.0.22621.0\km\x64;%LibraryPath%" ^
          /p:PreprocessorDefinitions="_AMD64_;_KERNEL_MODE;CONDITION_HANDLING=1;WIN32;_WINDOWS;%PreprocessorDefinitions%"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KsDumper-Full-Build
          path: |
            KsDumper11/bin/x86/Release/KsDumper11.exe
            KsDumperDriver/x64/Release/KsDumperDriver.sys
