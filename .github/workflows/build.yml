name: Build KsDumper EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Install WDK
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2249371" -OutFile "wdksetup.exe"
          $proc = Start-Process -FilePath "wdksetup.exe" -ArgumentList "/quiet /norestart /ceip off" -Wait -PassThru
          Write-Host "WDK installer exit code: $($proc.ExitCode)"

      - name: Restore All Dependencies
        run: nuget restore KsDumper11.sln

      - name: Build DarkControls
        run: msbuild DarkControls\DarkControls.csproj /p:Configuration=Release /p:Platform="AnyCPU"
        shell: cmd

      - name: Build DriverInterface
        run: msbuild DriverInterface\DriverInterface.csproj /p:Configuration=Release /p:Platform="AnyCPU"
        shell: cmd

      - name: Build KsDumper11
        run: msbuild KsDumper11\KsDumper11.csproj /p:Configuration=Release /p:Platform="x86" /p:OutputPath=bin\x86\Release
        shell: cmd

      - name: Patch vcxproj include path
        shell: powershell
        run: |
          $sdkVer = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Lib" |
            Where-Object { $_.Name -match "^\d+\.\d+\.\d+\.\d+$" } |
            Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty Name
          Write-Host "Patching for SDK: $sdkVer"
          $kmInc = "C:\Program Files (x86)\Windows Kits\10\Include\$sdkVer\km"
          $sharedInc = "C:\Program Files (x86)\Windows Kits\10\Include\$sdkVer\shared"
          $vcxproj = "KsDumperDriver\KsDumperDriver.vcxproj"
          $content = Get-Content $vcxproj -Raw
          $content = $content -replace '<AdditionalIncludeDirectories>([^<]*)</AdditionalIncludeDirectories>', "<AdditionalIncludeDirectories>$kmInc;$sharedInc;`$1</AdditionalIncludeDirectories>"
          if ($content -notmatch 'AdditionalIncludeDirectories') {
            $content = $content -replace '<ClCompile>', "<ClCompile>`n      <AdditionalIncludeDirectories>$kmInc;$sharedInc</AdditionalIncludeDirectories>"
          }
          Set-Content $vcxproj $content
          Write-Host "Patched vcxproj successfully"

      - name: Build Driver x64
        shell: powershell
        run: |
          $sdkVer = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Lib" |
            Where-Object { $_.Name -match "^\d+\.\d+\.\d+\.\d+$" } |
            Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty Name
          & msbuild KsDumperDriver\KsDumperDriver.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:WindowsTargetPlatformVersion=$sdkVer

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: KsDumper-Full-Build
          path: |
            KsDumper11/bin/x86/Release/
            KsDumperDriver/x64/Release/
