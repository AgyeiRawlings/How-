name: Build KsDumper EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Install WDK
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2249371" -OutFile "wdksetup.exe"
          $proc = Start-Process -FilePath "wdksetup.exe" -ArgumentList "/quiet /norestart /ceip off" -Wait -PassThru
          Write-Host "WDK installer exit code: $($proc.ExitCode)"
          $found = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter "ntddk.h" -Recurse -ErrorAction SilentlyContinue
          if ($found) { $found.FullName } else { Write-Host "ntddk.h still not found!" }

      - name: Restore All Dependencies
        run: nuget restore KsDumper11.sln

      - name: Build DarkControls
        run: msbuild DarkControls\DarkControls.csproj /p:Configuration=Release /p:Platform="AnyCPU"
        shell: cmd

      - name: Build DriverInterface
        run: msbuild DriverInterface\DriverInterface.csproj /p:Configuration=Release /p:Platform="AnyCPU"
        shell: cmd

      - name: Build KsDumper11
        run: msbuild KsDumper11\KsDumper11.csproj /p:Configuration=Release /p:Platform="x86" /p:OutputPath=bin\x86\Release
        shell: cmd

      - name: Build Driver x64
        shell: powershell
        run: |
          $ntddk = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter "ntddk.h" -Recurse | Select-Object -First 1
          $kmInc = $ntddk.DirectoryName
          $shared = $kmInc -replace "\\km$", "\shared"
          $lib = $kmInc -replace "\\Include\\", "\Lib\" -replace "\\km$", "\km\x64"
          Write-Host "KM Include: $kmInc"
          & msbuild KsDumperDriver\KsDumperDriver.vcxproj /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=10.0 "/p:IncludePath=$kmInc;$shared" "/p:LibraryPath=$lib"

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: KsDumper-Full-Build
          path: |
            KsDumper11/bin/x86/Release/
            KsDumperDriver/x64/Release/
