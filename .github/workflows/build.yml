name: Build KsDumper EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Install WDK
        run: |
          curl -L -o wdksetup.exe "https://go.microsoft.com/fwlink/?linkid=2249371"
          start /wait wdksetup.exe /quiet /norestart
          echo WDK install done
          dir "C:\Program Files (x86)\Windows Kits\10\Include\" /b
        shell: cmd

      - name: Restore All Dependencies
        run: nuget restore KsDumper11.sln

      - name: Build C# Projects
        run: |
          msbuild KsDumper11\KsDumper11.csproj /p:Configuration=Release /p:Platform="x86"
          msbuild DarkControls\DarkControls.csproj /p:Configuration=Release /p:Platform="AnyCPU"
          msbuild DriverInterface\DriverInterface.csproj /p:Configuration=Release /p:Platform="AnyCPU"
        shell: cmd

      - name: Build Driver x64
        run: |
          for /f "delims=" %%i in ('dir "C:\Program Files (x86)\Windows Kits\10\Include\" /b /ad /o-n') do set KITVER=%%i & goto :found
          :found
          msbuild KsDumperDriver\KsDumperDriver.vcxproj /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=%KITVER%
        shell: cmd

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: KsDumper-Full-Build
          path: |
            KsDumper11/bin/x86/Release/
            KsDumperDriver/x64/Release/
