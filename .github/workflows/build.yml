name: Build KsDumper EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Install WDK
        run: |
          curl -L -o wdksetup.exe "https://go.microsoft.com/fwlink/?linkid=2249371"
          wdksetup.exe /quiet /norestart
        shell: cmd

      - name: Restore All Dependencies
        run: nuget restore KsDumper11.sln

      - name: Build All Projects
        run: msbuild KsDumper11.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: KsDumper-Full-Build
          path: KsDumper11/bin/Release/
