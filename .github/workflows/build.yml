name: Build KsDumper EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Extract WDK Headers
        shell: powershell
        run: |
          # Extract to temp first to see structure
          Expand-Archive -Path WDKHeaders.zip -DestinationPath "C:\WDKTemp" -Force
          Write-Host "Extracted structure:"
          Get-ChildItem "C:\WDKTemp" -Recurse -Depth 2 | Select-Object FullName
          # Copy km and shared folders to correct location
          New-Item -ItemType Directory -Force -Path "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0"
          Copy-Item "C:\WDKTemp\km" "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km" -Recurse -Force
          Copy-Item "C:\WDKTemp\shared" "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\shared" -Recurse -Force
          # Extract lib
          Expand-Archive -Path WDKLib.zip -DestinationPath "C:\WDKLibTemp" -Force
          New-Item -ItemType Directory -Force -Path "C:\Program Files (x86)\Windows Kits\10\Lib\10.0.22621.0"
          Copy-Item "C:\WDKLibTemp\km" "C:\Program Files (x86)\Windows Kits\10\Lib\10.0.22621.0\km" -Recurse -Force
          # Verify
          $ntddk = Test-Path "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km\ntddk.h"
          Write-Host "ntddk.h exists: $ntddk"

      - name: Register SDK in Registry
        shell: powershell
        run: |
          $regPath = "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots"
          New-Item -Path $regPath -Force | Out-Null
          Set-ItemProperty -Path $regPath -Name "KitsRoot10" -Value "C:\Program Files (x86)\Windows Kits\10\" -Force
          Set-ItemProperty -Path $regPath -Name "10.0.22621.0" -Value "C:\Program Files (x86)\Windows Kits\10\" -Force

      - name: Restore All Dependencies
        run: nuget restore KsDumper11.sln

      - name: Build DarkControls
        run: msbuild DarkControls\DarkControls.csproj /p:Configuration=Release /p:Platform="AnyCPU"
        shell: cmd

      - name: Build DriverInterface
        run: msbuild DriverInterface\DriverInterface.csproj /p:Configuration=Release /p:Platform="AnyCPU"
        shell: cmd

      - name: Build KsDumper11
        run: msbuild KsDumper11\KsDumper11.csproj /p:Configuration=Release /p:Platform="x86" /p:OutputPath=bin\x86\Release
        shell: cmd

      - name: Build Driver x64
        run: msbuild KsDumperDriver\KsDumperDriver.vcxproj /p:Configuration=Release /p:Platform=x64
        shell: cmd

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: KsDumper-Full-Build
          path: |
            KsDumper11/bin/x86/Release/
            KsDumperDriver/x64/Release/
